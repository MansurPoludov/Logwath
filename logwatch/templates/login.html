{% extends "base.html" %}

{% block content %}
<div class="login-container">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Логин</label>
            <input type="text" name="username" class="input-small">
            {{ form.username.errors }}
        </div>

        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" class="input-small">
            {{ form.password.errors }}
        </div>

        <button type="submit"  class="btn">Войти</button>
                <p style="margin-top: 15px; margin-left: -1300px; color: var(--text-muted); text-align:center;">
            Нет аккаунта? <a href="{% url 'register' %}" style="color: var(--accent);">Зарегистрироваться</a>
        </p>
    </form>
</div>
{% endblock %}
