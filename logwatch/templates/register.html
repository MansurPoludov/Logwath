{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="login-container">

    <h2 style="margin-bottom: 25px; text-align:center;">Регистрация</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {% if error %}
            <p style="color: #ff4d4d; margin-bottom: 15px;">{{ error }}</p>
        {% endif %}

        <div class="form-group">
            <label>Имя пользователя</label>
            <input type="text" name="username" class="input-small" required>
        </div>

        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password1" class="input-small" required>
            {{ form.password1.errors }}
        </div>

        <div class="form-group">
            <label>Повторите пароль</label>
            <input type="password" name="password2" class="input-small" required>
            {{ form.password1.errors }}
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="input-small">
            {{ form.email.errors }}
        </div>

        <button type="submit" class="btn" style="width: 17%; margin-top: 10px;">
            Создать аккаунт
        </button>

        <p style="margin-top: 25px; color: var(--text-muted); text-align:left;">
            Уже есть аккаунт? <a href="{% url 'login' %}" style="color: var(--accent);">Войти</a>
        </p>
    </form>

</div>
{% endblock %}
